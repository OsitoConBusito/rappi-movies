name: design_system
description: Tema claro/oscuro, tokens MARQUEE, componentes y animaciones base.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

resolution: workspace

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  # Fuentes de MARQUEE empaquetadas (offline-first: sin descarga en runtime).
  # Ambas son variables (eje wght), Flutter aplica el peso vía fontWeight.
  fonts:
    - family: Sora
      fonts:
        - asset: fonts/Sora.ttf
    - family: IBMPlexSans
      fonts:
        - asset: fonts/IBMPlexSans.ttf
