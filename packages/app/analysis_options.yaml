include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/*.drift.dart"
    - "**/*.mocks.dart"

linter:
  rules:
    # Paquetes internos (no publicados) + estilo Clean Code sin comentarios
    # redundantes: no forzamos doc en cada miembro público. Desactivado a propósito.
    public_member_api_docs: false
