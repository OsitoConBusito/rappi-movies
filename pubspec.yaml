name: rappi_movies_workspace
description: Monorepo de la app de catálogo de películas/series (TMDB).
publish_to: none
version: 1.0.0

environment:
  sdk: ^3.12.2

workspace:
  - packages/app
  - packages/core
  - packages/design_system
  - packages/i18n
  - packages/features/feature_catalog

dev_dependencies:
  melos: ^7.0.0

melos:
  scripts:
    analyze:
      description: Análisis estático de todo el workspace.
      run: dart analyze .
    format:
      description: Formatea el código; falla en CI si hay cambios pendientes.
      run: dart format --set-exit-if-changed .
    test:
      description: Corre los tests de los paquetes que tienen carpeta test/.
      run: melos exec --dir-exists=test -- flutter test
    generate:
      description: Corre build_runner en los paquetes que usan code-gen.
      run: melos exec --depends-on=build_runner -- dart run build_runner build
    i18n:
      description: Genera las traducciones (slang) del paquete i18n.
      run: melos exec --scope=i18n -- dart run slang
