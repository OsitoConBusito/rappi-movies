name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Resolver dependencias (pub workspace)
        run: flutter pub get

      - name: Traducciones (slang)
        run: dart run melos run i18n

      - name: Generar código (build_runner)
        run: dart run melos run generate

      - name: Formato
        run: dart run melos run format

      - name: Análisis estático
        run: dart run melos run analyze

      - name: Tests
        run: dart run melos run test
